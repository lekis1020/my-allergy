<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Relationship graph — two modes</title>
<script src="https://cdn.tailwindcss.com"></script>
<style> body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; } </style>
</head>
<body class="bg-gray-100 p-8">
<div class="mx-auto grid max-w-4xl grid-cols-1 gap-8 md:grid-cols-3">

  <!-- Mode A: 전체 관계도 (DB-wide, default) -->
  <div>
    <p class="mb-2 text-center text-xs font-semibold text-gray-500">A · 전체 관계도 (DB 전체)</p>
    <div class="rounded-2xl border border-gray-200 bg-gray-50 p-4">
      <div class="mb-2 flex items-center justify-between">
        <h2 class="flex items-center gap-2 text-[11px] font-semibold uppercase tracking-wider text-gray-500">
          <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><path d="M12 7v4m0 0l-5.5 6M12 11l5.5 6"/></svg>
          Relationship graph
        </h2>
        <span class="rounded-md border border-gray-300 bg-white px-1.5 py-0.5 text-[10px] font-medium text-gray-500">⤢ 확대</span>
      </div>
      <div class="mb-3 inline-flex rounded-lg border border-gray-200 bg-white p-0.5 text-[11px]">
        <span class="rounded-md bg-blue-600 px-2.5 py-1 font-medium text-white">전체 관계도</span>
        <span class="rounded-md px-2.5 py-1 font-medium text-gray-500">내 관계도</span>
      </div>
      <div class="mb-3 overflow-hidden rounded-lg border border-gray-100 bg-white">
        <svg viewBox="0 0 250 160" width="100%" height="160">
          <g stroke="#14b8a6" stroke-width="1.6" stroke-dasharray="3 3" opacity="0.75">
            <line x1="125" y1="80" x2="55" y2="40"/><line x1="125" y1="80" x2="200" y2="45"/>
            <line x1="125" y1="80" x2="40" y2="110"/><line x1="125" y1="80" x2="210" y2="110"/>
            <line x1="125" y1="80" x2="110" y2="140"/><line x1="125" y1="80" x2="170" y2="135"/>
          </g>
          <g stroke="#9ca3af" stroke-width="2"><line x1="125" y1="80" x2="55" y2="40"/><line x1="125" y1="80" x2="210" y2="110"/></g>
          <g>
            <circle cx="55" cy="40" r="8" fill="#7c3aed"/><circle cx="200" cy="45" r="8" fill="#0891b2"/>
            <circle cx="40" cy="110" r="8" fill="#db2777"/><circle cx="210" cy="110" r="8" fill="#2563eb"/>
            <circle cx="110" cy="140" r="8" fill="#16a34a"/><circle cx="170" cy="135" r="8" fill="#ea580c"/>
          </g>
          <circle cx="125" cy="80" r="12" fill="#2563eb" stroke="#fff" stroke-width="3"/>
          <text x="125" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">이 논문</text>
        </svg>
      </div>
      <p class="text-xs text-gray-600"><span class="font-medium">8</span>개 연결<span class="text-teal-600"> · 유사 6</span><span class="text-gray-400"> · 인용 2</span></p>
      <p class="mt-1 text-[10px] text-gray-400">모든 사용자 공통 · 임베딩 유사도 기반</p>
    </div>
  </div>

  <!-- Mode B: 내 관계도 (account, logged in) -->
  <div>
    <p class="mb-2 text-center text-xs font-semibold text-gray-500">B · 내 관계도 (로그인 시)</p>
    <div class="rounded-2xl border border-gray-200 bg-gray-50 p-4">
      <div class="mb-2 flex items-center justify-between">
        <h2 class="flex items-center gap-2 text-[11px] font-semibold uppercase tracking-wider text-gray-500">
          <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><path d="M12 7v4m0 0l-5.5 6M12 11l5.5 6"/></svg>
          Relationship graph
        </h2>
        <span class="rounded-md border border-gray-300 bg-white px-1.5 py-0.5 text-[10px] font-medium text-gray-500">⤢ 확대</span>
      </div>
      <div class="mb-3 inline-flex rounded-lg border border-gray-200 bg-white p-0.5 text-[11px]">
        <span class="rounded-md px-2.5 py-1 font-medium text-gray-500">전체 관계도</span>
        <span class="rounded-md bg-violet-600 px-2.5 py-1 font-medium text-white">내 관계도</span>
      </div>
      <div class="mb-3 overflow-hidden rounded-lg border border-gray-100 bg-white">
        <svg viewBox="0 0 250 160" width="100%" height="160">
          <!-- bookmark edges (amber) + mention edges (blue) -->
          <g stroke="#f59e0b" stroke-width="1.8" opacity="0.8">
            <line x1="125" y1="80" x2="60" y2="45"/><line x1="125" y1="80" x2="195" y2="55"/><line x1="125" y1="80" x2="80" y2="135"/>
          </g>
          <g stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="4 3" opacity="0.85">
            <line x1="125" y1="80" x2="200" y2="120"/>
          </g>
          <g>
            <circle cx="60" cy="45" r="8" fill="#7c3aed"/><text x="60" y="34" text-anchor="middle" font-size="9">★</text>
            <circle cx="195" cy="55" r="8" fill="#2563eb"/><text x="195" y="44" text-anchor="middle" font-size="9">★</text>
            <circle cx="80" cy="135" r="8" fill="#16a34a"/><text x="80" y="124" text-anchor="middle" font-size="9">★</text>
            <circle cx="200" cy="120" r="8" fill="#ea580c"/><text x="200" y="109" text-anchor="middle" font-size="9">💬</text>
          </g>
          <circle cx="125" cy="80" r="12" fill="#7c3aed" stroke="#fff" stroke-width="3"/>
          <text x="125" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#fff">이 논문</text>
        </svg>
      </div>
      <p class="text-xs text-gray-600"><span class="font-medium">4</span>개 연결<span class="text-amber-600"> · 북마크 3</span><span class="text-blue-500"> · 멘션 1</span></p>
      <p class="mt-1 text-[10px] text-gray-400">내 북마크·댓글·멘션으로 쌓인 관계</p>
    </div>
  </div>

  <!-- Mode B empty: logged out -->
  <div>
    <p class="mb-2 text-center text-xs font-semibold text-gray-500">B · 내 관계도 (로그아웃 시)</p>
    <div class="rounded-2xl border border-gray-200 bg-gray-50 p-4">
      <div class="mb-2 flex items-center justify-between">
        <h2 class="flex items-center gap-2 text-[11px] font-semibold uppercase tracking-wider text-gray-500">
          <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2"/><circle cx="5" cy="19" r="2"/><circle cx="19" cy="19" r="2"/><path d="M12 7v4m0 0l-5.5 6M12 11l5.5 6"/></svg>
          Relationship graph
        </h2>
      </div>
      <div class="mb-3 inline-flex rounded-lg border border-gray-200 bg-white p-0.5 text-[11px]">
        <span class="rounded-md px-2.5 py-1 font-medium text-gray-500">전체 관계도</span>
        <span class="rounded-md bg-violet-600 px-2.5 py-1 font-medium text-white">내 관계도</span>
      </div>
      <div class="flex h-[160px] flex-col items-center justify-center gap-2 rounded-lg border border-dashed border-gray-200 bg-white text-center">
        <span class="text-2xl">🔖</span>
        <p class="px-4 text-xs text-gray-500">로그인하고 논문을 북마크·댓글하면<br/>나만의 관계도가 쌓입니다</p>
        <span class="rounded-lg bg-violet-600 px-3 py-1.5 text-[11px] font-medium text-white">로그인</span>
      </div>
    </div>
  </div>

</div>
</body>
</html>
